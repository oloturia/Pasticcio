# ============================================================
# alembic.ini — Alembic configuration
# ============================================================
#
# This file is read by Alembic when you run `alembic` commands.
# The most important setting is sqlalchemy.url, but we override
# it in env.py to read from the DATABASE_URL environment variable
# (so we don't hardcode credentials here).

[alembic]
# Path to the migration scripts
script_location = alembic

# Template for migration file names:
# %(year)d%(month).2d%(day).2d_%(hour).2d%(minute).2d_%(rev)s_%(slug)s
# Example: 20240315_1430_a1b2c3d4_add_bio_to_users.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration file timestamps
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
