# ============================================================
# pytest.ini — pytest configuration
# ============================================================
#
# This file tells pytest how to run our tests.
# It lives in the project root alongside podman-compose.yml.

[pytest]
# Where to find tests
testpaths = tests

# Run async tests automatically (our tests use async/await
# because FastAPI and SQLAlchemy are async)
asyncio_mode = auto

# Show extra info: -v (verbose), -s (print statements)
addopts = -v --tb=short

# Warnings to ignore (third-party libraries we can't control)
filterwarnings =
    ignore::DeprecationWarning:passlib
