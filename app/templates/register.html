{% extends "base.html" %}

{% block title %}Register — Pasticcio{% endblock %}

{% block content %}
<div class="page-narrow">

    <div style="max-width:400px;margin:3rem auto;">

        <h1 style="margin-bottom:0.25rem;">Create an account</h1>
        <p class="meta">
            Already have an account? <a href="/login">Log in</a>
        </p>

        {% if error %}
        <p style="color:#b5541a;background:#fdf3ee;border:1px solid #f5c9b0;
                  border-radius:6px;padding:0.75rem 1rem;margin:1rem 0;font-size:0.9rem;">
            {{ error }}
        </p>
        {% endif %}

        <form method="post" action="/register" style="margin-top:1.5rem;display:flex;flex-direction:column;gap:1rem;">

            <div>
                <label for="username" style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.3rem;">
                    Username
                </label>
                <input
                    id="username"
                    name="username"
                    type="text"
                    autocomplete="username"
                    required
                    minlength="3"
                    maxlength="64"
                    pattern="[a-zA-Z0-9_\-]+"
                    title="Letters, numbers, hyphens and underscores only"
                    value="{{ username or '' }}"
                    style="width:100%;padding:0.55rem 0.75rem;border:1px solid #e5e5e0;
                           border-radius:6px;font-size:1rem;background:#fff;
                           outline:none;transition:border-color 0.15s;"
                    onfocus="this.style.borderColor='#b5541a'"
                    onblur="this.style.borderColor='#e5e5e0'"
                >
                <small style="color:#999;font-size:0.8rem;">
                    Letters, numbers, hyphens and underscores. Min 3 characters.
                </small>
            </div>

            <div>
                <label for="email" style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.3rem;">
                    Email
                </label>
                <input
                    id="email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    required
                    value="{{ email or '' }}"
                    style="width:100%;padding:0.55rem 0.75rem;border:1px solid #e5e5e0;
                           border-radius:6px;font-size:1rem;background:#fff;
                           outline:none;transition:border-color 0.15s;"
                    onfocus="this.style.borderColor='#b5541a'"
                    onblur="this.style.borderColor='#e5e5e0'"
                >
            </div>

            <div>
                <label for="display_name" style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.3rem;">
                    Display name <span style="color:#999;font-weight:400;">(optional)</span>
                </label>
                <input
                    id="display_name"
                    name="display_name"
                    type="text"
                    autocomplete="name"
                    maxlength="128"
                    value="{{ display_name or '' }}"
                    style="width:100%;padding:0.55rem 0.75rem;border:1px solid #e5e5e0;
                           border-radius:6px;font-size:1rem;background:#fff;
                           outline:none;transition:border-color 0.15s;"
                    onfocus="this.style.borderColor='#b5541a'"
                    onblur="this.style.borderColor='#e5e5e0'"
                >
            </div>

            <div>
                <label for="password" style="display:block;font-size:0.85rem;font-weight:600;margin-bottom:0.3rem;">
                    Password
                </label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="new-password"
                    required
                    minlength="8"
                    style="width:100%;padding:0.55rem 0.75rem;border:1px solid #e5e5e0;
                           border-radius:6px;font-size:1rem;background:#fff;
                           outline:none;transition:border-color 0.15s;"
                    onfocus="this.style.borderColor='#b5541a'"
                    onblur="this.style.borderColor='#e5e5e0'"
                >
                <small style="color:#999;font-size:0.8rem;">Minimum 8 characters.</small>
            </div>

            <button
                type="submit"
                style="padding:0.6rem 1.25rem;background:#b5541a;color:#fff;
                       border:none;border-radius:6px;font-size:1rem;font-weight:600;
                       cursor:pointer;transition:background 0.15s;"
                onmouseover="this.style.background='#9a4516'"
                onmouseout="this.style.background='#b5541a'"
            >
                Create account
            </button>

        </form>

    </div>

</div>
{% endblock %}
