<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pasticcio{% endblock %}</title>
    <style>
        /* Minimal reset and base styles — full frontend coming later */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            color: #1a1a1a;
            background: #fafaf8;
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        a { color: #b5541a; text-decoration: none; }
        a:hover { text-decoration: underline; }

        header { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e5e5e0; }
        header a.site-name { font-size: 1.4rem; font-weight: 700; color: #1a1a1a; }
        header small { color: #666; margin-left: 0.5rem; font-size: 0.85rem; }

        footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #e5e5e0;
                 font-size: 0.85rem; color: #888; }

        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.25rem; }
        h2 { font-size: 1.2rem; font-weight: 600; margin: 1.5rem 0 0.75rem; }

        .meta { color: #666; font-size: 0.9rem; margin-bottom: 1rem; }
        .bio  { margin: 0.75rem 0 1.5rem; color: #333; }

        .recipe-list { list-style: none; }
        .recipe-list li { padding: 0.6rem 0; border-bottom: 1px solid #f0f0eb; }
        .recipe-list li:last-child { border-bottom: none; }
        .recipe-list .date { font-size: 0.8rem; color: #999; margin-left: 0.5rem; }

        .ap-link { font-size: 0.8rem; color: #999; margin-top: 1rem; }
    </style>
</head>
<body>
    <header>
        <a class="site-name" href="/">🍝 Pasticcio</a>
        <small>federated recipe network</small>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>
            Pasticcio &mdash; federated, open-source recipe network &mdash;
            <a href="/.well-known/nodeinfo">NodeInfo</a>
        </p>
    </footer>
</body>
</html>
